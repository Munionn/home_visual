version: "3.8"

services:
  mongodb:
    image: mongo:7.0
    container_name: home_visual_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  mqtt:
    image: eclipse-mosquitto:2.0
    container_name: home_visual_mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: unless-stopped

volumes:
  mongodb_data:
